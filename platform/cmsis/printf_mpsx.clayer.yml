layer:
  description: Printf retarget for ARM MPS2 & MPS3 FPGA

  groups:
    - group: Printf retarget
      files:
        - file: stdout_USART.c
        - file: fvp_shutdown.c

  components:
    - component: CMSIS-Compiler:CORE
    - component: CMSIS-Compiler:STDOUT:Custom
    - component: CMSIS-Compiler:STDERR:Custom
    - component: ARM::Device:Native Driver:UART
      for-context:
        - +MPS3-Corstone-300
        - +Ethos-MPS3-Corstone-300
        - +MPS3-Corstone-310
        - +Ethos-MPS3-Corstone-310
        - +Corstone-315
        - +Ethos-Corstone-315

    - component: ARM::CMSIS Driver:USART
      for-context:
        - +MPS3-Corstone-300
        - +Ethos-MPS3-Corstone-300
        - +MPS3-Corstone-310
        - +Ethos-MPS3-Corstone-310
        - +Corstone-315
        - +Ethos-Corstone-315

    - component: Keil::CMSIS Driver:USART
      not-for-context:
        - +MPS3-Corstone-300
        - +Ethos-MPS3-Corstone-300
        - +MPS3-Corstone-310
        - +Ethos-MPS3-Corstone-310
        - +Corstone-315
        - +Ethos-Corstone-315
